name: "CodeQL"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze with CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python, actions

      - uses: github/codeql-action/analyze@v3
